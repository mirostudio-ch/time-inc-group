<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 90" fill="none">
  <!-- Clock icon above the "i" -->
  <circle cx="99" cy="14" r="11" stroke="#f5f0eb" stroke-width="1.8" fill="none"/>
  <line x1="99" y1="7" x2="99" y2="14" stroke="#f5f0eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="99" y1="14" x2="104" y2="11" stroke="#f5f0eb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small tick marks on clock -->
  <line x1="99" y1="4.5" x2="99" y2="6" stroke="#f5f0eb" stroke-width="1" stroke-linecap="round"/>
  <line x1="99" y1="22" x2="99" y2="23.5" stroke="#f5f0eb" stroke-width="1" stroke-linecap="round"/>
  <line x1="89.5" y1="14" x2="88" y2="14" stroke="#f5f0eb" stroke-width="1" stroke-linecap="round"/>
  <line x1="110" y1="14" x2="108.5" y2="14" stroke="#f5f0eb" stroke-width="1" stroke-linecap="round"/>
  
  <!-- "TIME" text -->
  <text x="0" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" fill="#f5f0eb" letter-spacing="-1">T</text>
  <text x="45" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" fill="#f5f0eb" letter-spacing="-1">i</text>
  <text x="68" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" fill="#f5f0eb" letter-spacing="-1">ME</text>
  
  <!-- "Inc." text -->
  <text x="208" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#f5f0eb" letter-spacing="1"> Inc.</text>
  
  <!-- "Group" text -->
  <text x="378" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#f5f0eb" letter-spacing="1"> Group</text>
</svg>
